input {
  tcp {
    port => 5000
    codec => json_lines
  }
}

filter {
  if [message] {
    mutate {
      add_field => { "parsed" => "true" }
    }
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "logs-%{+YYYY.MM.dd}"
  }
  stdout { codec => rubydebug }
}