# ─────────────────────────────────────────────────────────────────────────────
# Grafana Dashboard Provisioning
# Auto-loads dashboards from the /var/lib/grafana/dashboards directory
# ─────────────────────────────────────────────────────────────────────────────

apiVersion: 1

providers:
  - name: 'assessment-dashboards'
    orgId: 1
    folder: 'Monitoring Assessment'
    folderUid: 'monitoring-assessment'
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
