# ─────────────────────────────────────────────────────────────────────────────
# Prometheus Configuration
# Scrapes: application metrics + Node Exporter (infrastructure metrics)
# ─────────────────────────────────────────────────────────────────────────────

global:
  scrape_interval:     15s   # How often to scrape targets
  evaluation_interval: 15s   # How often to evaluate rules
  scrape_timeout:      10s   # Timeout for scrape requests

  external_labels:
    monitor: 'monitoring-stack'
    environment: 'assessment'

# ─── Alerting (optional wiring for future alertmanager) ──────────────────────
alerting:
  alertmanagers:
    - static_configs:
        - targets: []

# ─── Scrape Configurations ────────────────────────────────────────────────────
scrape_configs:

  # 1. Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
    metrics_path: '/metrics'

  # 2. Application metrics (custom + default Node.js)
  - job_name: 'monitored-app'
    static_configs:
      - targets: ['app:3000']
    metrics_path: '/metrics'
    scrape_interval: 10s        # More frequent for app metrics
    honor_labels: true

  # 3. Infrastructure metrics via Node Exporter
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
    metrics_path: '/metrics'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'docker-host'
