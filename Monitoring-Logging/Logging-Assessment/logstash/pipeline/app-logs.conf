# ──────────────────────────────────────────────────────────────
# logstash/pipeline/app-logs.conf
# Input → Filter → Output
# ──────────────────────────────────────────────────────────────

input {
  beats {
    port => 5044
  }
}

# ── Filter: enrich & normalise ─────────────────────────────────
filter {

  # ── 1. Parse the ISO-8601 timestamp coming from the app ──────
  if [timestamp] {
    date {
      match  => ["timestamp", "ISO8601"]
      target => "@timestamp"
      remove_field => ["timestamp"]
    }
  }

  # ── 2. Normalise log level → uppercase ───────────────────────
  if [level] {
    mutate {
      uppercase => ["level"]
    }
  }

  # ── 3. Map level to numeric severity (SIEM-friendly) ─────────
  mutate {
    add_field => { "severity" => "0" }
  }
  if [level] == "DEBUG"    { mutate { update => { "severity" => "1" } } }
  if [level] == "INFO"     { mutate { update => { "severity" => "2" } } }
  if [level] == "WARNING"  { mutate { update => { "severity" => "3" } } }
  if [level] == "ERROR"    { mutate { update => { "severity" => "4" } } }
  if [level] == "CRITICAL" { mutate { update => { "severity" => "5" } } }
  mutate { convert => { "severity" => "integer" } }

  # ── 4. Tag errors & criticals for easy filtering ─────────────
  if [level] in ["ERROR", "CRITICAL"] {
    mutate {
      add_tag => ["alert"]
    }
  }

  # ── 5. Extract HTTP status code bucket from message ──────────
  if [message] =~ /→ \d{3}/ {
    grok {
      match => { "message" => "→ %{NUMBER:http_status_code:int}" }
    }
    if [http_status_code] >= 500 {
      mutate { add_tag => ["http_5xx"] }
    } else if [http_status_code] >= 400 {
      mutate { add_tag => ["http_4xx"] }
    }
  }

  # ── 6. Rename / clean up Filebeat meta-fields ────────────────
  mutate {
    remove_field => ["agent", "ecs", "input", "log", "@version"]
    rename       => { "[host][name]" => "filebeat_host" }
  }
}

# ── Output: write to Elasticsearch ────────────────────────────
output {
  elasticsearch {
    hosts    => ["http://elasticsearch:9200"]
    index    => "app-logs-%{+YYYY.MM.dd}"
    # ILM off for simplicity; enable in production
    ilm_enabled => false
  }

  # Uncomment for debugging:
  # stdout { codec => rubydebug }
}
